services:
  runtime_builder:
    image: ${BASE_IMAGE:-python:3.12.8-bullseye}
    platform: linux/arm64
    command:
      - "/bin/bash"
      - "-lc"
      - "/local/build-runtime.sh 2>&1"
    env_file:
      - build-config
    stdin_open: true
    tty: true
    volumes:
      - type: bind
        source: .
        target: /local
